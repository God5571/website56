<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จิรพล วสุคงสิน — Student Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="terminal" id="terminal">
    <div class="titlebar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="path">jirapon@student-project:~$</span>
    </div>

    <div class="screen" id="screen">
      <!-- Lines are typed in by script.js -->
    </div>

    <section class="extend-zone" id="extendZone">
      <p class="extend-label">// AI_EXTENSION_ZONE — เพิ่มโค้ดใหม่ต่อจากตรงนี้ได้เลย</p>
      <div class="extend-box">
        <p>ยังไม่มีฟีเจอร์เพิ่มเติม รอ AI หรือเจ้าของโปรเจกต์มาต่อโค้ด ✦</p>
      </div>
    </section>

    <footer class="statusbar">
      <span>student-id: 69319011103</span>
      <span class="blinker">● live</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
